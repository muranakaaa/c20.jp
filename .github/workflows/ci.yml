name: ci

# main への push は deploy.yml が CI 込みで走らせるため、こちらは PR のみ
on:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: bun install --frozen-lockfile
      - run: bun run ci
      - run: bun run build
      - run: bun run verify
